name: Release

# Tag-driven release: push a tag like `v0.2.0` to trigger cross-platform builds.
# Manual: also runnable from the Actions tab via workflow_dispatch (no Release).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14            # Apple Silicon runner
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            label: macOS (Apple Silicon)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
            label: Windows (x64)

    runs-on: ${{ matrix.platform }}
    name: Build — ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # When triggered by a tag (v*.*.*), tauri-action creates a draft Release
          # and uploads the platform artifacts to it. On workflow_dispatch (no tag),
          # it just builds and uploads to the workflow artifact storage.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('SayKnow {0}', github.ref_name) || '' }}
          releaseBody: |
            See [README](https://github.com/jaybeyond/sayknow_translate#readme) for usage.

            ### Downloads
            - **macOS (Apple Silicon)**: `.dmg`
            - **Windows (x64)**: `.exe` (NSIS installer) and `.msi`

            ### macOS first launch
            The build is unsigned. Either right-click → Open, or:
            ```bash
            xattr -dr com.apple.quarantine /Applications/SayKnow.app
            ```
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
